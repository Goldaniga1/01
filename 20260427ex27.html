<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex27</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #4ab8e8;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Row 1：綠色，永遠全寬，不隨寬度改變 */
        .row1 .item {
            width: 100%;
            height: 80px;
            background: #8bc34a;
            border-radius: 4px;
        }

        /* Row 2：teal，3 個元素，預設（手機）全寬疊排 */
        .row2 .item {
            flex: 1 1 100%;
            height: 55px;
            background: #26c6da;
            border-radius: 4px;
        }

        /* Row 3：灰色，4 個元素，預設（手機）2 個一排 */
        .row3 .item {
            flex: 1 1 calc(50% - 4px);
            height: 55px;
            background: #e0e0e0;
            border-radius: 4px;
        }

        /* ≥ 480px：row2 → 3欄，row3 → 4欄 */
        @media (min-width: 480px) {
            .row2 .item {
                flex: 1 1 calc(33.33% - 6px);
            }
            .row3 .item {
                flex: 1 1 calc(25% - 6px);
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Row 1：不隨寬度改變 -->
    <div class="row row1">
        <div class="item"></div>
    </div>

    <!-- Row 2：3 個元素 -->
    <div class="row row2">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>

    <!-- Row 3：4 個元素 -->
    <div class="row row3">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>

</div>

</body>
</html>
